name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Test
        run: go test ./...

      - name: Cross-compile
        run: |
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            output="agentswarm-server-${os}-${arch}"
            echo "Building ${output}..."
            GOOS="$os" GOARCH="$arch" go build -o "$output" ./cmd/agentswarm-server
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            agentswarm-server-linux-amd64
            agentswarm-server-linux-arm64
            agentswarm-server-darwin-amd64
            agentswarm-server-darwin-arm64
